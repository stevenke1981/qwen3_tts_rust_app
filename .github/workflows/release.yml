# Build and package release for Windows
# Produces a password-protected zip containing:
#   - qwen-tts-app.exe (Rust CLI + GUI binary)
#   - qwen.dll + ggml*.dll (from qwentts.cpp)
#   - config example, README, setup scripts
#
# Trigger: push to master/main, tag push (v*), or manual dispatch.

name: Build and Package

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout main repo ──────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup toolchains ────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Build Rust release (CLI + GUI + FFI) ────────────────
      - name: Build Rust release
        run: cargo build --release --features "gui,ffi"

      # ── 3b. Run tests ──────────────────────────────────────────
      - name: Run tests
        run: cargo test --release --features "gui,ffi"

      # ── 3c. Verify setup script output ─────────────────────────
      - name: Verify setup scripts
        shell: pwsh
        run: |
          $bash_all = cargo run --release --features "ffi" -- setup-script --target all 2>&1
          if ($bash_all -match "-DGGML_CUDA=ON.*-DGGML_VULKAN=ON.*-DGGML_METAL=ON") {
            Write-Host "✅ bash setup-script --all: correct CMake flags" -ForegroundColor Green
          } else { Write-Warning "bash --all missing expected CMake flags" }

          $ps_cuda = cargo run --release --features "ffi" -- setup-script --target cuda --powershell 2>&1
          if ($ps_cuda -match '"cuda".*"-DGGML_CUDA=ON"') {
            Write-Host "✅ powershell setup-script --cuda: correct switch" -ForegroundColor Green
          } else { Write-Warning "powershell --cuda missing expected switch" }

      # ── 4. Install GPU toolkits (CUDA + Vulkan) ──────────────
      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2
        with:
          cuda: '12.6'

      - name: Install Vulkan SDK
        shell: pwsh
        run: choco install vulkan-sdk --no-progress -y

      # ── 5. Build qwen.dll from qwentts.cpp ─────────────────────
      - name: Checkout qwentts.cpp
        uses: actions/checkout@v4
        with:
          repository: stevenke1981/qwentts.cpp
          path: qwentts.cpp
          submodules: recursive

      - name: Build qwen.dll (CUDA + Vulkan — Metal is macOS-only)
        working-directory: qwentts.cpp
        run: |
          cmake -B build -DQWEN_SHARED=ON -DCMAKE_BUILD_TYPE=Release `
            -DGGML_CUDA=ON -DGGML_VULKAN=ON
          cmake --build build --config Release

      # ── 6. Install 7-Zip for password-protected archive ────────
      - name: Install 7-Zip
        run: choco install 7zip --no-progress -y

      # ── 7. List build outputs (diagnostic) ────────────────────
      - name: List build outputs
        shell: pwsh
        run: |
          Write-Output "=== Rust binary ==="
          Get-Item target\release\qwen-tts-app.exe
          Write-Output "=== qwen.dll ==="
          Get-ChildItem -Recurse qwentts.cpp\build\*.dll | Select-Object FullName, Length

      # ── 8. Stage all files ─────────────────────────────────────
      - name: Stage files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging\scripts -Force | Out-Null
          New-Item -ItemType Directory -Path staging\models -Force | Out-Null
          New-Item -ItemType Directory -Path staging\output -Force | Out-Null

          Copy-Item target\release\qwen-tts-app.exe staging\

          # qwen.dll is in build/Release/
          Copy-Item qwentts.cpp\build\Release\qwen.dll staging\

          # ggml*.dll are in build/src/Release/
          Copy-Item qwentts.cpp\build\src\Release\ggml.dll staging\
          Copy-Item qwentts.cpp\build\src\Release\ggml-base.dll staging\
          Copy-Item qwentts.cpp\build\src\Release\ggml-cpu.dll staging\

          Copy-Item qwen-tts.toml.example staging\
          Copy-Item README.md staging\
          Copy-Item scripts\* staging\scripts\ -ErrorAction SilentlyContinue

      # ── 9. Create password-protected zip ───────────────────────
      - name: Package zip
        shell: pwsh
        run: |
          $pass = "091968559"
          & "C:\Program Files\7-Zip\7z.exe" a -tzip "-p$pass" -mx=9 qwen3-tts-app-windows.zip .\staging\*

      # ── 10. Upload as workflow artifact ─────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qwen3-tts-app-windows
          path: qwen3-tts-app-windows.zip
